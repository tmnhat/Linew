# Linew Nginx Configuration for Windows
# =====================================
# This is a simplified nginx.conf for Windows development/testing
# For production, use Caddy or proper nginx with SSL

worker_processes 1;
error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log logs/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ==========================================
    # Linew API Server (FastAPI)
    # ==========================================
    upstream api_backend {
        server 127.0.0.1:8000;
    }

    # ==========================================
    # WordPress Server
    # ==========================================
    upstream wordpress_backend {
        server 127.0.0.1:8888;
    }

    # ==========================================
    # Dashboard Server (React/Vite dev)
    # ==========================================
    upstream dashboard_backend {
        server 127.0.0.1:3000;
    }

    # ==========================================
    # Main Server Block - example.com
    # ==========================================
    server {
        listen 80;
        server_name example.com www.example.com;

        # Redirect HTTP to HTTPS (for production with SSL)
        # Uncomment when SSL is configured:
        # return 301 https://$server_name$request_uri;

        # Prediction API
        location /api/prediction/ {
            proxy_pass http://api_backend/api/prediction/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        }

        # Widget API
        location /api/widget/ {
            proxy_pass http://api_backend/api/widget/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Frame-Options "ALLOW-FROM https://example.com" always;
        }

        # Dashboard WebSocket
        location /dashboard/ws/ {
            proxy_pass http://api_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Dashboard API
        location /dashboard/api/ {
            rewrite ^/dashboard/api(/.*)?$ /api$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Dashboard SPA (static files served separately)
        location /dashboard {
            alias C:/Users/tmnha/Linew/dashboard/dist;
            try_files $uri $uri/ /dashboard/index.html;
        }

        # Dashboard assets
        location /dashboard/assets {
            alias C:/Users/tmnha/Linew/dashboard/dist/assets;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # WordPress Admin via /wp.admin path
        location ^~ /wp.admin {
            proxy_pass http://wordpress_backend/wp-admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # WordPress wp-admin
        location ~ ^/wp-admin/(.*)$ {
            proxy_pass http://wordpress_backend/wp-admin/$1$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # WordPress Login
        location = /wp-login.php {
            proxy_pass http://wordpress_backend/wp-login.php;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SEO - Sitemap
        location = /sitemap.xml {
            proxy_pass http://api_backend/sitemap.xml;
            proxy_cache_valid 200 1h;
        }

        location = /sitemap-news.xml {
            proxy_pass http://api_backend/sitemap-news.xml;
            proxy_cache_valid 200 1h;
        }

        # SEO - Robots.txt
        location = /robots.txt {
            proxy_pass http://api_backend/robots.txt;
            proxy_cache_valid 200 24h;
        }

        # Feed API
        location /api/feed {
            proxy_pass http://api_backend/api/feed;
            proxy_set_header Host $host;
            proxy_cache_valid 200 60s;
        }

        # Default - proxy to WordPress
        location / {
            proxy_pass http://wordpress_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ==========================================
    # HTTPS Server Block (Uncomment for SSL)
    # ==========================================
    # server {
    #     listen 443 ssl http2;
    #     server_name example.com www.example.com;
    #
    #     ssl_certificate C:/Users/tmnha/Linew/ssl/fullchain.pem;
    #     ssl_certificate_key C:/Users/tmnha/Linew/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #
    #     # ... same location blocks as above ...
    # }
}
