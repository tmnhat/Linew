# Linew - example.com
server {
    listen 80;
    server_name example.com www.example.com;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Widget prediction iframe (standalone HTML)
    location /api/widget/ {
        proxy_pass http://api:8000/api/widget/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Widget headers
        add_header X-Frame-Options "ALLOW-FROM https://example.com" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://example.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline';" always;
    }

    # Prediction API - CORS headers for WordPress widget
    location /api/prediction/ {
        proxy_pass http://api:8000/api/prediction/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # CORS headers - allow all origins for API
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Max-Age 86400 always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Dashboard SPA (public - authentication handled by React app)
    location ^~ /dashboard {
        alias /usr/share/nginx/html/dashboard;
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Dashboard assets (public)
    location ~ ^/dashboard/assets(/.*)?$ {
        alias /usr/share/nginx/html/dashboard/assets$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Dashboard API (public - authentication handled by FastAPI)
    location /dashboard/api/ {
        rewrite ^/dashboard/api(/.*)?$ /api$1 break;
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 30s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Dashboard WebSocket (public - authentication handled by FastAPI)
    location /dashboard/ws/ {
        proxy_pass http://api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }

    # WordPress Admin - Direct wp-admin access
    location ^~ /wp-admin {
        proxy_pass http://wordpress:80/wp-admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;

        # Don't cache admin
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # WordPress Admin Ajax (wp-admin/admin-ajax.php)
    location = /wp-admin/admin-ajax.php {
        proxy_pass http://wordpress:80/wp-admin/admin-ajax.php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # WordPress Login
    location = /wp-login.php {
        proxy_pass http://wordpress:80/wp-login.php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    # SEO - Sitemap (from FastAPI)
    # Redirect /sitemap to /sitemap.xml (preserve https)
    location = /sitemap {
        return 301 https://$host/sitemap.xml;
    }

    location = /sitemap.xml {
        proxy_pass http://api:8000/sitemap.xml;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap-news.xml {
        proxy_pass http://api:8000/sitemap-news.xml;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap-full.xml {
        proxy_pass http://api:8000/sitemap-full.xml;
        proxy_set_header Host $host;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
    }

    # SEO - Robots.txt (from FastAPI)
    location = /robots.txt {
        proxy_pass http://api:8000/robots.txt;
        proxy_set_header Host $host;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
    }

    # Smart Feed API
    location /api/feed {
        proxy_pass http://api:8000/api/feed;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_valid 200 60s;
        add_header Cache-Control "public, max-age=60";
    }

    # API - Direct API access
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # WordPress - tất cả request đều proxy
    location / {
        proxy_pass http://wordpress:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
